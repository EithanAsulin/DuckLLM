<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuckLLM</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #08080a;
      --pill: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --blue: #0066FF;
      --green: #00FF88;
      --yellow: #FFD700;
      --red: #FF4B4B;
      --cyan: #00E5FF;
      --text: #F0F0F0;
      --dim: #888;
      --user-bg: rgba(0, 102, 255, 0.1);
      --user-bdr: rgba(0, 102, 255, 0.3);
      --ai-bg: rgba(255, 255, 255, 0.03);
      --ai-bdr: rgba(255, 255, 255, 0.08);
      --glass: blur(12px) saturate(180%);
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 102, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(0, 255, 136, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 0%, rgba(8, 8, 10, 0.5) 100%);
      pointer-events: none;
      z-index: 0;
      animation: bgFlow 20s ease-in-out infinite alternate;
    }

    @keyframes bgFlow {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.1);
      }
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 4vw;
    }

    header {
      display: flex;
      align-items: center;
      padding: 24px 0;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--pill);
      backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 18px 8px 12px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .logo-pill:hover {
      transform: scale(1.02);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 15px var(--green);
    }

    .logo-text {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .pill-btn {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 8px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--pill);
      backdrop-filter: var(--glass);
      color: var(--dim);
      cursor: pointer;
      transition: all 0.25s ease;
      text-transform: uppercase;
    }

    .pill-btn:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.1);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    #chat::-webkit-scrollbar {
      width: 6px;
    }

    #chat::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 99px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    #chat::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .msg-row {
      display: flex;
      opacity: 0;
      transform: translateY(20px);
      animation: msgAppear 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes msgAppear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bubble {
      max-width: 70%;
      border-radius: 24px;
      padding: 16px 24px;
      font-size: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      unicode-bidi: isolate;
      text-align: start;
    }

    .msg-row.user .bubble {
      background: linear-gradient(135deg, #1e293b, #020817);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-bottom-right-radius: 4px;
      margin-left: auto;
      margin-right: 20px;
    }

    .msg-row.assistant .bubble {
      background: var(--ai-bg);
      backdrop-filter: var(--glass);
      border: 1px solid var(--ai-bdr);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .code-wrap {
      background: #0d0d0f;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      overflow: hidden;
      margin: 12px 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .code-top {
      display: flex;
      align-items: center;
      background: #141418;
      padding: 10px 18px;
    }

    .code-pre {
      padding: 20px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
    }

    #thinking {
      padding: 10px 0;
      opacity: 0.8;
    }

    .think-bubble {
      background: var(--ai-bg);
      backdrop-filter: var(--glass);
      border: 1px solid var(--ai-bdr);
      border-radius: 20px;
      padding: 12px 20px;
    }

    #input-area {
      flex-shrink: 0;
      padding: 20px 0 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    #input-pill {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 8px 12px 8px 24px;
      display: flex;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    #input-pill:focus-within {
      border-color: rgba(0, 102, 255, 0.5);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 10px 50px rgba(0, 102, 255, 0.2);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      color: #fff;
      resize: none;
      min-height: 24px;
      max-height: 140px;
      line-height: 1.6;
      padding: 8px 0;
      caret-color: var(--blue);
    }

    #input::placeholder {
      color: #555;
    }

    #plus-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    #plus-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 28px;
      font-weight: 300;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 102, 255, 0.3);
      z-index: 10;
    }

    #plus-btn:hover {
      transform: scale(1.08) rotate(5deg);
      background: #005ae6;
      box-shadow: 0 10px 25px rgba(0, 102, 255, 0.4);
    }

    #plus-btn.open {
      transform: rotate(45deg);
      background: #25252a;
      color: #fff;
    }

    #plus-menu {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
    }

    #plus-menu.open {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }

    .menu-btn {
      white-space: nowrap;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 10px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(20, 20, 25, 0.8);
      backdrop-filter: blur(10px);
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .menu-btn:hover {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .menu-btn.on-web {
      color: var(--blue);
      border-color: rgba(0, 102, 255, 0.4);
      background: rgba(0, 102, 255, 0.1);
    }

    .menu-btn.on-unfi {
      color: var(--red);
      border-color: rgba(255, 75, 75, 0.4);
      background: rgba(255, 75, 75, 0.1);
    }

    #attach-chip {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(0, 255, 136, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--green);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      animation: chipIn 0.3s ease-out;
    }

    @keyframes chipIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    #attach-chip.visible {
      display: flex;
    }

    #attach-chip-x {
      cursor: pointer;
      opacity: 0.6;
      font-size: 16px;
      margin-left: 5px;
    }

    #attach-chip-x:hover {
      opacity: 1;
      color: #fff;
    }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <div class="logo-pill">
        <div class="dot" id="dot"></div>
        <span class="logo-text" id="brand">DUCKLLM</span>
      </div>
      <div class="header-right">
      </div>
    </header>

    <div id="chat">
      <div id="thinking">
        <div class="think-bubble">
          <div class="tdots"><span></span><span></span><span></span></div>
          <span class="think-lbl" id="think-lbl">Thinking</span>
        </div>
      </div>
    </div>

    <div id="attach-chip">
      <span>📄</span>
      <span id="attach-chip-name"></span>
      <span id="attach-chip-x" onclick="clearAttach()">✕</span>
    </div>
    <div id="input-area">
      <div id="input-pill">
        <textarea id="input" placeholder="Ask DuckLLM..." rows="1"></textarea>
      </div>
      <div id="plus-wrap">
        <div id="plus-menu">
          <button class="menu-btn" id="menu-web" onclick="toggleWeb()">🌐 Web</button>
          <button class="menu-btn" id="menu-unfi" onclick="toggleUnfi()">🔓 Unfiltered</button>
          <button class="menu-btn" id="menu-file" onclick="document.getElementById('file-input').click()">📎
            Attach</button>
          <input type="file" id="file-input" accept="image/*,.pdf,.txt,.py,.js,.ts,.html,.css,.json,.md,.csv"
            style="display:none" onchange="handleFile(this)">
        </div>
        <button id="plus-btn" onclick="toggleMenu()">+</button>
      </div>
    </div>
  </div>

  <script>
    let chatHistory = [], busy = false, webMode = false, unfiMode = false;
    let pendingImageB64 = null, pendingFileText = null;

    (async () => {
      try {
        const r = await fetch('http://localhost:17432/duckllm_settings.json');
        if (r.ok) { const s = await r.json(); webMode = s.web_mode || false; unfiMode = s.unfiltered_mode || false; syncUI(); }
      } catch (e) { console.warn('Settings load failed:', e); }

      try {
        const r = await fetch('http://localhost:17432/duckllm_chat.json?_=' + Date.now());
        if (!r.ok) { console.warn('Chat fetch not ok:', r.status); return; }
        const msgs = await r.json();
        console.log('Loaded msgs:', msgs);
        if (Array.isArray(msgs) && msgs.length) {
          chatHistory = msgs;
          msgs.forEach(m => {
            const text = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
            addBubble(m.role, text);
          });
          scrollEnd();
        }
      } catch (e) { console.error('Chat load failed:', e); }
    })();

    function syncUI() {
      document.getElementById('menu-web').classList.toggle('on-web', webMode);
      document.getElementById('menu-unfi').classList.toggle('on-unfi', unfiMode);
      const x = [];
      if (webMode) x.push('WEB');
      if (unfiMode) x.push('UNFILTERED');
      document.getElementById('brand').textContent = x.length ? `DUCKLLM [${x.join(' ')}]` : 'DUCKLLM';
    }
    function toggleWeb() { webMode = !webMode; syncUI(); saveSettings(); }
    function toggleUnfi() { unfiMode = !unfiMode; syncUI(); saveSettings(); }

    function saveSettings() {
      fetch('http://localhost:17432/save-settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ web_mode: webMode, unfiltered_mode: unfiMode }, null, 2)
      }).catch(() => { });
    }

    let menuOpen = false;
    function toggleMenu() {
      menuOpen = !menuOpen;
      document.getElementById('plus-btn').classList.toggle('open', menuOpen);
      document.getElementById('plus-menu').classList.toggle('open', menuOpen);
    }
    document.addEventListener('click', e => {
      if (menuOpen && !document.getElementById('plus-wrap').contains(e.target)) {
        menuOpen = false;
        document.getElementById('plus-btn').classList.remove('open');
        document.getElementById('plus-menu').classList.remove('open');
      }
    });

    function setDot(c) { const d = document.getElementById('dot'); d.style.background = c; d.style.boxShadow = `0 0 8px ${c}`; }

    const inp = document.getElementById('input');
    inp.addEventListener('input', () => { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 140) + 'px'; });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });

    function handleFile(fileInput) {
      const file = fileInput.files[0];
      if (!file) return;
      const isImg = file.type.startsWith('image/');
      const reader = new FileReader();
      reader.onload = e => {
        if (isImg) {
          pendingImageB64 = e.target.result.split(',')[1];
          pendingFileText = null;
        } else {
          pendingImageB64 = null;
          pendingFileText = `[File: ${file.name}]\n${e.target.result}`;
        }
        const chip = document.getElementById('attach-chip');
        chip.querySelector('span').textContent = isImg ? '🖼' : '📄';
        document.getElementById('attach-chip-name').textContent = file.name;
        chip.classList.add('visible');
        const btn = document.getElementById('menu-file');
        btn.textContent = '📎 Attach';
        btn.style.color = ''; btn.style.borderColor = '';
        toggleMenu();
      };
      isImg ? reader.readAsDataURL(file) : reader.readAsText(file);
      fileInput.value = '';
    }

    function clearAttach() {
      pendingImageB64 = null;
      pendingFileText = null;
      document.getElementById('attach-chip').classList.remove('visible');
      const btn = document.getElementById('menu-file');
      btn.textContent = '📎 Attach';
      btn.style.color = ''; btn.style.borderColor = '';
      btn.onclick = () => document.getElementById('file-input').click();
    }

    const thinkEl = document.getElementById('thinking');
    const thinkLbl = document.getElementById('think-lbl');
    const phrases = ['Thinking', 'Processing', 'Analyzing', 'Generating'];
    let tTimer = null;
    function showThink(lbl) { thinkLbl.textContent = lbl || 'Thinking'; thinkEl.classList.add('on'); let i = 0; tTimer = setInterval(() => { thinkLbl.textContent = phrases[i++ % phrases.length]; }, 1800); scrollEnd(); }
    function hideThink() { clearInterval(tTimer); thinkEl.classList.remove('on'); }
    function scrollEnd() { const c = document.getElementById('chat'); c.scrollTop = c.scrollHeight; }
    function saveChat() {
      try {
        fetch('http://localhost:17432/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(chatHistory.map(m => ({ role: m.role, content: m.content })), null, 2)
        });
      } catch { }
    }

    function renderText(text) {
      const frag = document.createDocumentFragment();
      const re = /```(\w*)\n?([\s\S]*?)```/g;
      let last = 0, m;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) appendTxt(frag, text.slice(last, m.index));
        frag.appendChild(mkCode(m[2], m[1]));
        last = m.index + m[0].length;
      }
      if (last < text.length) appendTxt(frag, text.slice(last));
      return frag;
    }

    function appendTxt(parent, txt) {
      if (!txt.trim()) return;
      const blocks = txt.trim().split(/\n\n+/);
      blocks.forEach(block => {
        const p = document.createElement('p');
        p.setAttribute('dir', 'auto');
        p.style.margin = '8px 0';
        
        let html = block.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        
        // Add trailing RLM if Hebrew is detected to fix punctuation jumping
        const hasHebrew = /[\u0590-\u05FF]/.test(block);
        if (hasHebrew) html += '\u200F';

        html = html.replace(/\b\*\*(.*?)\*\*\b/g, '<strong>$1</strong>');
        html = html.replace(/\b\*(.*?)\*\b/g, '<em>$1</em>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

        if (html.startsWith('- ') || html.startsWith('* ')) {
          const li = html.split(/\n[*-] /).map(item => `<li><bdi dir="auto">${item.replace(/^[*-] /, '')}</bdi></li>`).join('');
          p.innerHTML = `<ul>${li}</ul>`;
        } else {
          p.innerHTML = `<bdi dir="auto">${html.replace(/\n/g, '<br>')}</bdi>`;
        }
        parent.appendChild(p);
      });
    }

    function mkCode(code, lang) {
      const d = document.createElement('div');
      d.className = 'code-wrap';
      d.innerHTML = `<div class="code-top"><span class="code-lang">${lang || 'code'}</span><button class="code-copy-btn">Copy</button></div><div class="code-pre"></div>`;
      d.querySelector('.code-pre').textContent = code.trimEnd();
      d.querySelector('.code-copy-btn').onclick = function () { navigator.clipboard.writeText(code); this.textContent = 'Copied!'; setTimeout(() => this.textContent = 'Copy', 1500); };
      return d;
    }

    function addBubble(role, text) {
      const chat = document.getElementById('chat');
      const row = document.createElement('div'); row.className = `msg-row ${role}`;
      const bub = document.createElement('div'); bub.className = 'bubble';
      bub.setAttribute('dir', 'auto');
      bub.appendChild(renderText(text));
      row.appendChild(bub);
      chat.insertBefore(row, thinkEl);
      scrollEnd();
      return bub;
    }

    function streamBubble() {
      const chat = document.getElementById('chat');
      const row = document.createElement('div'); row.className = 'msg-row assistant';
      const bub = document.createElement('div'); bub.className = 'bubble';
      bub.setAttribute('dir', 'auto');
      const p = document.createElement('p'); p.style.margin = '0';
      p.setAttribute('dir', 'auto');
      const cur = document.createElement('span'); cur.className = 'cursor';
      p.appendChild(cur); bub.appendChild(p); row.appendChild(bub);
      chat.insertBefore(row, thinkEl);
      scrollEnd();
      return { bub, p, cur };
    }

    async function sendMsg() {
      const q = inp.value.trim();
      if (!q || busy) return;
      busy = true;
      inp.value = ''; inp.style.height = 'auto';
      inp.disabled = true;
      setDot('#FFCC00');
      addBubble('user', q);
      const imgB64 = pendingImageB64;
      const fileText = pendingFileText;
      if (imgB64 || fileText) clearAttach();
      webMode ? await doWeb(q) : await doChat(q, imgB64, fileText);
      busy = false;
      inp.disabled = false;
      inp.focus();
      setDot('#00FF88');
    }

    async function doChat(q, imgB64, fileText) {
      showThink('Thinking');
      const content = fileText ? `${q}\n\n${fileText}` : q;
      const userMsg = { role: 'user', content };
      if (imgB64) userMsg.images = [imgB64];
      chatHistory.push(userMsg);
      const model = unfiMode ? 'DuckLLM_Unfiltered:latest' : 'DuckLLM:latest';
      try {
        const res = await fetch('http://localhost:11434/api/chat', { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ 
            model, 
            messages: chatHistory, 
            stream: true,
            options: {
              temperature: 0.4,
              top_p: 0.9,
              repeat_penalty: 1.2
            }
          }) 
        });
        hideThink(); setDot('#00CCFF');
        const { bub, p, cur } = streamBubble();
        const reader = res.body.getReader(), dec = new TextDecoder();
        let full = '';
        while (true) {
          const { done, value } = await reader.read(); if (done) break;
          for (const line of dec.decode(value).split('\n').filter(Boolean)) {
            try { const t = JSON.parse(line)?.message?.content || ''; full += t; p.textContent = full; p.appendChild(cur); scrollEnd(); } catch { }
          }
        }
        cur.remove(); p.remove(); bub.appendChild(renderText(full));
        chatHistory.push({ role: 'assistant', content: full });
        if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
        saveChat();
        scrollEnd();
      } catch (e) { hideThink(); addBubble('assistant', `Error: ${e.message}`); }
    }

    async function doWeb(q) {
      showThink('Searching');
      const model = unfiMode ? 'DuckLLM_Unfiltered:latest' : 'DuckLLM:latest';
      let context = '', sources = [];
      try {
        const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://html.duckduckgo.com/html/?q=' + encodeURIComponent(q))}`);
        const d = await r.json(), html = d.contents || '';
        context = [...html.matchAll(/class="result__snippet"[^>]*>(.*?)<\/a>/gs)].slice(0, 6).map(m => m[1].replace(/<[^>]+>/g, '').trim()).filter(Boolean).join(' ');
        sources = [...html.matchAll(/uddg=([^&"]+)/g)].slice(0, 4).map(m => { try { return new URL(decodeURIComponent(m[1])).hostname.replace('www.', ''); } catch { return null; } }).filter(Boolean);
      } catch { }
      if (!context) context = 'No results found.';
      try {
        const res = await fetch('http://localhost:11434/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model, prompt: `Respond in the same language as the query. Answer concisely.\n\nContext: ${context}\n\nQuestion: ${q}`, stream: true }) });
        hideThink(); setDot('#00CCFF');
        const { bub, p, cur } = streamBubble();
        const reader = res.body.getReader(), dec = new TextDecoder();
        let full = '';
        while (true) {
          const { done, value } = await reader.read(); if (done) break;
          for (const line of dec.decode(value).split('\n').filter(Boolean)) {
            try { const t = JSON.parse(line)?.response || ''; full += t; p.textContent = full; p.appendChild(cur); scrollEnd(); } catch { }
          }
        }
        cur.remove();
        if (sources.length) full += `\n\nSources: ${sources.join(', ')}`;
        p.remove(); bub.appendChild(renderText(full));
        chatHistory.push({ role: 'user', content: q });
        chatHistory.push({ role: 'assistant', content: full });
        saveChat();
        scrollEnd();
      } catch (e) { hideThink(); addBubble('assistant', `Search error: ${e.message}`); }
    }
  </script>
</body>
